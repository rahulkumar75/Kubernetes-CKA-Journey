apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: databases.mycompany.com  # <plural>.<group>

spec:
  group: mycompany.com

  names:
    plural: databases
    singular: database
    kind: Database
    shortNames:
      - db

  # scope: Namespaced
  scope: Cluster

  versions:
    - name: v1alpha1
      served: true
      storage: true

      additionalPrinterColumns:
      - name: Engine
        type: string
        jsonPath: .spec.engine

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object
              properties:
                engine:
                  type: string
                version: 
                  type: string
        

    - name: v1
      served: false
      storage: false

      additionalPrinterColumns:
      - name: Engine
        type: string
        jsonPath: .spec.engine

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              required: # schema validation.
              - engine

              properties:
                engine: 
                  type: string

                  enum:   # schema validation.
                  - mysql
                  - postgres
              
                version:
                  type: string







