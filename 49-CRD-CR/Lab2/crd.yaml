apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition

metadata:
  name: foodeployments.mycompany.com

spec:
  group: mycompany.com

  scope: Namespaced

  names:
    plural: foodeployments
    singular: foodeployment
    kind: FooDeployment

  versions:
    - name: v1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object

              properties:
                deploymentName:
                  type: string

                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10

            status:
              type: object