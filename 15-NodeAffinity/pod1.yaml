apiVersion: v1

kind: Pod

metadata:
  name: pod-green

spec:
  containers:
  - name: nginx
    image: nginx
    resources:
        requests:
          memory: "10Mi"
          cpu: "250m"
        limits:
          memory: "128Mi"
          cpu: "500m"

  tolerations:
  - key: "color"
    operator: "Equal"
    value: "green"
    effect: "NoSchedule"

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: gpu
            operator: In
            values:
            - "false"