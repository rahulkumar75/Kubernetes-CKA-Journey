apiVersion: v1
kind: Pod
metadata:
  name: mem-pod
  labels:
    mem: "true"
  namespace: mem-res
spec:
  containers:
  - name: linux
    image: polinux/stress
    resources:
      requests:
        memory: "30Mi"
      limits:
        memory: "100Mi"
    command: ["stress"]
    args: ["--vm","1","--vm-bytes","50M", "--vm-hang","1"]