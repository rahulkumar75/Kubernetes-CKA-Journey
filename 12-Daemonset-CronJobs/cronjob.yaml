apiVersion: batch/v1
kind: CronJob
metadata:
  name: db-backup
spec:
  schedule: "5 12 * * *"   # Runs daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: busybox:latest
            command:
            - bin/sh
            - -c
            - "echo 'Taking DB backup...' & sleep 10"
          restartPolicy: OnFailure