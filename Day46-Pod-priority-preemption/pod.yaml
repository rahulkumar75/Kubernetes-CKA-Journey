apiVersion: v1
kind: Pod
metadata:
  name: higher-priority-nginx
spec:
  priorityClassName: higher-priority
  containers:
    - name: nginx
      image: nginx
      resources:
        requests:
          memory: "128Mi"
          cpu: "2000m"
        # limits:
        #   memory: "128Mi"
        #   cpu: "500m"
      ports:
        - containerPort: 80
