apiVersion: v1
kind: Pod
metadata: 
  name: liveness-http
  labels:
    dev: deno
spec:
  containers:
  - name: liveness
    image: nginx:latest
    ports:
      - containerPort: 80

    livenessProbe:
      httpGet:
        path: /
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5

    readinessProbe:
      httpGet:
        path: /notfound
        port: 80
      initialDelaySeconds: 5
      periodSeconds: 5