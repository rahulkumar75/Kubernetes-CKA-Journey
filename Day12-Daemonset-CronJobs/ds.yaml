apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nginx-ds
  labels:
    env: demo
spec:
  selector:
    matchLabels:
      env: demo
  template:
    metadata:
      name: nginx-ds
      labels:
        env: demo
    spec:
      containers:
      - name: nginx-ds
        image: nginx
        ports:
        - containerPort: 80


