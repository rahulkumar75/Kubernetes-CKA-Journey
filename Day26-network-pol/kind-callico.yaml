apiVersion: kind.x-k8s.io/v1alpha4
kind: Cluster
name: cka-cluster  # optional but better here

nodes:
- role: control-plane
  extraPortMappings:
    - containerPort: 30001
      hostPort: 30001
- role: worker
  labels:
    node-type: worker-1
- role: worker
  labels:
    node-type: worker-2
networking:
  disableDefaultCNI: true
  podSubnet: 192.168.0.0/16